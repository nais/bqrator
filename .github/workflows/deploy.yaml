name: Build and deploy
on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "*.env"
env:
  NAME: bqrator
  FEATURE_REPOSITORY: oci://europe-north1-docker.pkg.dev/nais-io/nais/feature
  CHART_PATH: "charts"

jobs:
  build_and_push:
    outputs:
      version: ${{ steps.build_chart.outputs.version }}
      name: ${{ steps.build_chart.outputs.name }}
    permissions:
      contents: "read"
      id-token: "write"
    name: build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # ratchet:jdx/mise-action@v4

      - run: mise run test
      - run: mise run check

      - run: git diff --exit-code --name-only

      - uses: nais/platform-build-push-sign@df590279b21bc5978519685752f9eaddd546043c # ratchet:nais/platform-build-push-sign@main
        id: build-push-sign
        with:
          name: ${{ env.NAME }}
          google_service_account: gh-${{ env.NAME }}
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          push: true

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # ratchet:azure/setup-helm@v5
        name: "Setup Helm"

      - name: Build Chart
        id: build_chart
        run: |-
          suffix="$(date +%Y%m%d%H%M%S)"
          orig_version=$(yq '.version' < "${{ env.CHART_PATH}}/Chart.yaml")
          new_version="${orig_version}-$suffix"

          sed -i "s/^version: .*/version: $new_version/g" "${{ env.CHART_PATH}}/Chart.yaml"
          yq e -i '.image.tag = "${{ steps.build-push-sign.outputs.version }}"' "${{ env.CHART_PATH}}/values.yaml"

          helm dependency update "${{ env.CHART_PATH}}"
          helm package "${{ env.CHART_PATH}}" --destination .

          name=$(yq '.name' "${{ env.CHART_PATH}}/Chart.yaml")
          echo "name=$name" >> $GITHUB_OUTPUT
          echo "chart=$name-$new_version.tgz" >> $GITHUB_OUTPUT
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Push Chart
        run: |-
          chart="${{ steps.build_chart.outputs.chart }}"
          echo "Pushing: $chart"
          helm push "$chart" ${{ env.FEATURE_REPOSITORY }}

  deploy:
    needs:
      - build_and_push
    runs-on: fasit-deploy
    permissions:
      id-token: write
    steps:
      - uses: nais/fasit-deploy@9f870e05e92cde6cfd827b13384ec09e80be65fd # ratchet:nais/fasit-deploy@v4.1.0
        with:
          chart: ${{ env.FEATURE_REPOSITORY }}/${{ needs.build_and_push.outputs.name }}
          version: ${{ needs.build_and_push.outputs.version }}
          targets: |
            [
              { "target": { "kind": "tenant", "tenant": "ci-nais" }, "wait": true },
              { "target": { "kind": "tenant" } }
            ]
